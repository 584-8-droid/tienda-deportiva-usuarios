<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportZone | Iniciar Sesión</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
            padding: 2rem;
        }
        .login-card {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 3rem;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-card h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        .error-msg {
            color: red;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo"><a href="/" style="color: inherit;">Sport<span class="highlight">Zone</span></a></div>
        </div>
    </header>

    <section class="login-section">
        <div class="login-card">
            <h2>INICIAR SESIÓN</h2>
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Ej: admin">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ej: admin123">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Ingresar</button>
            </form>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="/" style="color: var(--text-dark); text-decoration: underline;">Volver a Inicio</a>
            </div>
        </div>
    </section>
</body>
</html>
