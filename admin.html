<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportZone | Panel de Administración</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-section {
            padding: 100px 20px 50px;
            min-height: 80vh;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 1rem;
        }
        .admin-card {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #eee;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <header class="navbar" style="background-color: rgba(18, 18, 18, 0.95);">
        <div class="container">
            <div class="logo"><a href="/" style="color: inherit;">Sport<span class="highlight">Zone</span></a></div>
            <nav class="nav-links">
                <span style="color: var(--primary-color); font-weight: bold;">Hola, {{ current_user }}</span>
                <a href="/logout">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <section class="admin-section container">
        <div class="admin-header">
            <h2>GESTIÓN DE <span class="highlight">USUARIOS</span></h2>
        </div>

        <div class="admin-card">
            <h3>Añadir Nuevo Usuario</h3>
            <form action="/admin/users/create" method="POST" style="margin-top: 1rem;">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" name="username" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select name="role">
                            <option value="user">Usuario Regular</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Crear Usuario</button>
            </form>
        </div>

        <div class="admin-card">
            <h3>Lista de Usuarios</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user.id }}</td>
                            <td>{{ user.username }}</td>
                            <td>{{ user.email }}</td>
                            <td>
                                <span style="background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem;">
                                    {{ user.role }}
                                </span>
                            </td>
                            <td>
                                <form action="/admin/users/delete/{{ user.id }}" method="POST" style="display:inline;">
                                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar usuario?')"><i class="fas fa-trash"></i> Eliminar</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
